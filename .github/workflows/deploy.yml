name: Deploy PWA

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: pwa
        run: npm ci

      - name: Build
        working-directory: pwa
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Debug SSH key
        run: |
          echo "Key file size: $(wc -c < ~/.ssh/deploy_key)"
          echo "Key starts with: $(head -c 30 ~/.ssh/deploy_key)"
          echo "Key line count: $(wc -l < ~/.ssh/deploy_key)"
          ssh -vvv -i ~/.ssh/deploy_key -o BatchMode=yes ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'echo ok' 2>&1 | grep -E "Offering|Trying|Authentication|debug1 identity"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            pwa/out/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/floatynotey/
